[platformio]
default_envs = hosyond

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:hosyond]
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^6.21.4

build_flags =
    -D USE_HOSYOND=1
    -D LV_CONF_SKIP=1
    -D USER_SETUP_LOADED=1
    -D ILI9488_DRIVER=1
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=4
    -D TOUCH_CS=21
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SPI_FREQUENCY=27000000

[env:ssd1306]
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson@^6.21.4

build_flags =
    -D USE_SSD1306=1
    -D PIN_SDA=21
    -D PIN_SCL=22

[env:native]
platform = native
test_framework = unity
